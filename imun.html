    <!-- PWA Setup (Manifest embedded via Data URI) -->

    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
        // Generate a dynamic manifest
        const manifestData = {
            "name": "פיטנס 5X - תוכנית אימונים",
            "short_name": "פיטנס 5X",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0b0f19",
            "theme_color": "#0b0f19",
            "icons": [{
                "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>💪</text></svg>",
                "sizes": "192x192 512x512",
                "type": "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // Simple inline Service Worker
        const swCode = `
            self.addEventListener('install', (e) => {
                self.skipWaiting();
            });
            self.addEventListener('activate', (e) => {
                e.waitUntil(clients.claim());
            });
            self.addEventListener('fetch', (e) => {
                // Pass through, no caching needed since it's a single file
                e.respondWith(fetch(e.request).catch(() => new Response('Offline mode')));
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swURL = URL.createObjectURL(swBlob);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swURL)
                    .then(reg => console.log('SW registered inline'))
                    .catch(err => console.log('SW reg failed: ', err));
            });
        }
    </script>

            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {

                    // Match saved states back to our main workouts array
                    parsed.forEach((savedWorkout, wIdx) => {
                        if (workouts[wIdx]) {
                            savedWorkout.exercises.forEach((savedEx, exIdx) => {
                                if (workouts[wIdx].exercises[exIdx]) {
                                    // Load checked sets
                                    if (Array.isArray(savedEx.sets)) {
                                        savedEx.sets.forEach((val, sIdx) => {
                                            if (sIdx < workouts[wIdx].exercises[exIdx].sets.length) {
                                                workouts[wIdx].exercises[exIdx].sets[sIdx] = val;

                                    // Load weight
                                    if (savedEx.weight !== undefined) {
                                        workouts[wIdx].exercises[exIdx].weight = savedEx.weight;
                                    }

                            });
                        }
                    });
                } catch (e) {
                    console.error("Error parsing saved state", e);
                }
            }
        }

        // Sound Engine (Web Audio API)
        function playChime() {
            if (isMuted) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const playBeep = (time, pitch, duration) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(pitch, time);
                    gain.gain.setValueAtTime(0.12, time);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(time);
                    osc.stop(time + duration);
                };

                const now = ctx.currentTime;
                playBeep(now, 587.33, 0.2); // D5
                playBeep(now + 0.15, 880.00, 0.4); // A5
            } catch (e) {
                console.log("Audio play blocked or not supported");
            }
        }

                    if (done) completedSets++;
                });

            const percent = totalSets > 0 ? Math.round((completedSets / totalSets) * 100) : 0;
            
            // Update UI Elements safely to prevent JavaScript crashing when elements are omitted
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const statusIcon = document.getElementById('status-icon');

            if (progressBar) progressBar.style.width = `${percent}%`;

            if (statusIcon) {

                if (percent === 100) {
                    statusIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                    `;
                    statusIcon.className = "w-5 h-5 text-emerald-400 mt-1 transition-colors duration-300";
                } else if (percent > 0) {
                    statusIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    `;
                    statusIcon.className = "w-5 h-5 text-brand-500 mt-1 transition-colors duration-300";
                } else {
                    statusIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    `;
                    statusIcon.className = "w-5 h-5 text-slate-500 mt-1 transition-colors duration-300";
                }
            }

            if (percent === 100) {
                // Show celebration popup and start confetti
                triggerCelebration();
                // Pause the total workout stopwatch as they have completed the exercises
                if (isStopwatchRunning) {
                    toggleStopwatch();
                }
            }
        }

        // Rest Timer Logic Functions
        function formatTime(sec) {
            const minutes = Math.floor(sec / 60);
            const seconds = sec % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function setTimerDuration(duration) {
            timerPreset = duration;
            resetTimer();
            
            // Adjust visual selected styling for presets
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.className = "preset-btn bg-slate-800/80 hover:bg-slate-850 border border-dark-border py-2 px-1 rounded-xl text-xs font-semibold text-slate-300 transition-all active:scale-95";
                if(btn.innerText.includes(duration.toString())) {
                    btn.className = "preset-btn ring-2 ring-brand-500 bg-brand-500/10 border border-brand-500 py-2 px-1 rounded-xl text-xs font-semibold text-brand-400 transition-all active:scale-95";
                }
            });
        }

        // Adjust timer seconds directly (plus/minus 10s)
        function adjustTimer(amount) {
            if (isTimerRunning) {
                // If running, adjust current remaining seconds
                timerSeconds = Math.max(0, timerSeconds + amount);
                document.getElementById('timer-display').innerText = formatTime(timerSeconds);
            } else {
                // If not running, adjust preset and reset
                timerPreset = Math.max(0, timerPreset + amount);
                resetTimer();
            }
        }

        function toggleTimer() {
            const btnIcon = document.getElementById('play-pause-icon');
            const timerDisplay = document.getElementById('timer-display');

            if (isTimerRunning) {
                // Pause Timer
                clearInterval(timerInterval);
                isTimerRunning = false;
                timerDisplay.classList.remove('pulse-active', 'text-brand-400');
                btnIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                `;
            } else {
                // Start Timer
                isTimerRunning = true;
                timerDisplay.classList.add('pulse-active', 'text-brand-400');
                btnIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                `;

                timerInterval = setInterval(() => {
                    timerSeconds--;
                    timerDisplay.innerText = formatTime(timerSeconds);

                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        resetTimer();
                        playChime();
                        showToast("הטיימר הסתיים! הסט הבא מחכה לך 💪");
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            timerSeconds = timerPreset;
            
            const timerDisplay = document.getElementById('timer-display');
            const btnIcon = document.getElementById('play-pause-icon');

            timerDisplay.innerText = formatTime(timerSeconds);
            timerDisplay.classList.remove('pulse-active', 'text-brand-400');
            
            btnIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            `;
        }

        // Stopwatch / Global Workout Timer
        function toggleStopwatch() {
            const btn = document.getElementById('btn-stopwatch-toggle');
            const display = document.getElementById('stopwatch-display');

            if (isStopwatchRunning) {
                // Pause
                clearInterval(stopwatchInterval);
                isStopwatchRunning = false;
                btn.innerText = "המשך שעון";
                btn.className = "text-[10px] font-bold bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 px-2 py-1 rounded-lg transition-colors border border-amber-500/20";
                display.classList.remove('pulse-active');
            } else {
                // Start
                isStopwatchRunning = true;
                btn.innerText = "עצור שעון";
                btn.className = "text-[10px] font-bold bg-red-500/10 hover:bg-red-500/20 text-red-400 px-2 py-1 rounded-lg transition-colors border border-red-500/20";
                display.classList.add('pulse-active');

                stopwatchInterval = setInterval(() => {
                    stopwatchSeconds++;
                    display.innerText = formatTime(stopwatchSeconds);
                    
                    // Alert at exactly 30 minutes!
                    if (stopwatchSeconds === 1800) {
                        playChime();
                        showToast("עברו 30 דקות! מומלץ לסיים את התרגילים בקרוב 💪");
                    }
                }, 1000);
            }
        }

        function resetStopwatch() {
            clearInterval(stopwatchInterval);
            isStopwatchRunning = false;
            stopwatchSeconds = 0;
            
            const btn = document.getElementById('btn-stopwatch-toggle');
            const display = document.getElementById('stopwatch-display');
            
            display.innerText = "00:00";
            display.classList.remove('pulse-active');
            btn.innerText = "התחל שעון";
            btn.className = "text-[10px] font-bold bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 px-2 py-1 rounded-lg transition-colors border border-amber-500/20";
        }

        // Reset Current Day Progress
        function resetDayProgress() {
            const workout = workouts[currentDay];
            workout.exercises.forEach(ex => {
                ex.sets = ex.sets.map(() => false);
                ex.weight = "";
            });
            saveState();
            renderWorkout(workout);
            updateProgress();
            resetStopwatch();
            showToast("אימון היום הבוצע אופס בהצלחה!");
        }

        // Confirm Reset All Weekly Progress
        function confirmResetAll() {
            const hasConfirmed = confirm("האם אתה בטוח שברצונך לאפס את הנתונים והמשקלים של כל השבוע?");
            if (hasConfirmed) {
                workouts.forEach(w => {
                    w.exercises.forEach(ex => {
                        ex.sets = ex.sets.map(() => false);
                        ex.weight = "";
                    });
                });
                saveState();
                renderWorkout(workouts[currentDay]);
                updateProgress();
                resetStopwatch();
                showToast("כל נתוני השבוע אופסו בהצלחה!");
            }
        }

        // Custom Notification Toast Handlers
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                dismissToast();
            }, 5000);
        }

        function dismissToast() {
            const toast = document.getElementById('custom-toast');
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
        }

        // Celebration and Confetti Logic
        function triggerCelebration() {
            const modal = document.getElementById('celebration-modal');
            const modalBox = modal.querySelector('div');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalBox.classList.remove('scale-95');
            modalBox.classList.add('scale-100');

            isConfettiActive = true;
            createConfettiShower();
            setTimeout(() => {
                isConfettiActive = false;
            }, 4000);
        }

        function closeCelebration() {
            const modal = document.getElementById('celebration-modal');
            const modalBox = modal.querySelector('div');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalBox.classList.add('scale-95');
            modalBox.classList.remove('scale-100');
        }

        // Canvas Confetti Code
        let canvas, ctx;
        let confettiPieces = [];
        let isConfettiActive = false;

        function setupConfetti() {
            canvas = document.getElementById('confetti-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height - 20;
                this.size = Math.random() * 8 + 6;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }

            update() {
                this.y += this.speed;
                this.angle += this.rotationSpeed;
                if (this.y > canvas.height) {
                    if (isConfettiActive) {
                        this.y = -20;
                        this.x = Math.random() * canvas.width;
                    } else {
                        return false;
                    }
                }
                return true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.angle * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function createConfettiShower() {
            confettiPieces = [];
            for (let i = 0; i < 150; i++) {
                confettiPieces.push(new Confetti());
            }
            requestAnimationFrame(animateConfetti);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            confettiPieces.forEach(p => {
                if (p.update()) {
                    p.draw();
                    alive = true;
                }
            });
            if (alive || isConfettiActive) {
                requestAnimationFrame(animateConfetti);
            }
        }
    </script>
</body>
